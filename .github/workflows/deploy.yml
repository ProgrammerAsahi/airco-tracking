name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install and test
        run: |
          python -m pip install ".[azure]"
          python -m unittest discover -v
          python -m compileall -q airco_tracker tests
          bash -n scripts/*.sh

      - name: Audit Python dependencies
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit

      - name: Compile Bicep templates
        run: |
          az bicep install
          for template in infra/*.bicep; do
            az bicep build --file "$template" --stdout >/dev/null
          done

      - name: Log in to Azure with OIDC
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy immutable image
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          EMAIL_LANG: ${{ vars.EMAIL_LANG }}
          KEY_VAULT_SECRET_MAP: ${{ vars.KEY_VAULT_SECRET_MAP }}
          IMAGE_TAG: ${{ github.sha }}
        run: ./scripts/deploy-application.sh

      - name: Write deployment summary
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          {
            echo "## Azure deployment"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Resource group: \`${AZURE_RESOURCE_GROUP}\`"
            echo "- Job: \`airco-tracker-job\`"
          } >> "$GITHUB_STEP_SUMMARY"
