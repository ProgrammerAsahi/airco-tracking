name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install and test
        run: |
          python -m pip install ".[azure]"
          python -m unittest discover -v
          python -m compileall -q airco_tracker tests
          bash -n scripts/*.sh

      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit
          pip-audit

      - name: Compile Bicep templates
        run: |
          az bicep install
          for template in infra/*.bicep; do
            az bicep build --file "$template" --stdout >/dev/null
          done

      - name: Log in to Azure with OIDC
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy immutable image
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_PREFIX: ${{ vars.AZURE_PREFIX }}
          EMAIL_LANG: ${{ vars.EMAIL_LANG }}
          EMAIL_MIN_SEND_INTERVAL_SECONDS: ${{ vars.EMAIL_MIN_SEND_INTERVAL_SECONDS }}
          EMAIL_MAX_REPLICAS: ${{ vars.EMAIL_MAX_REPLICAS }}
          ACS_EMAIL_DOMAIN_NAME: ${{ vars.ACS_EMAIL_DOMAIN_NAME }}
          DEPLOYMENT_PAUSED: ${{ vars.DEPLOYMENT_PAUSED }}
          IMAGE_TAG: ${{ github.sha }}
        run: ./scripts/deploy-application.sh

      - name: Write deployment summary
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          {
            echo "## Azure deployment"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Resource group: \`${AZURE_RESOURCE_GROUP}\`"
            echo "- Scanner: \`airco-tracker-job\`"
            echo "- Outbox publisher: \`airco-alert-publisher-job\`"
            echo "- Recipient reconciler: \`airco-alert-reconciler-job\`"
            echo "- Retention job: \`airco-alert-retention-job\`"
            echo "- Fan-out apps: \`airco-alert-fanout-coordinator\`, \`airco-alert-fanout-worker\`"
            echo "- Email app: \`airco-alert-email-worker\`"
          } >> "$GITHUB_STEP_SUMMARY"
